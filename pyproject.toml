[[tool.importlinter.contracts]]
name = "exporter slices stay independent"
type = "independence"
modules = [
    "civix.infra.exporters.drift",
    "civix.infra.exporters.json",
    "civix.infra.exporters.parquet",
    "civix.infra.exporters.validation",
]

[[tool.importlinter.contracts]]
name = "infra source helpers stay independent"
type = "independence"
modules = [
    "civix.infra.sources.ckan",
    "civix.infra.sources.csv",
    "civix.infra.sources.openfema",
    "civix.infra.sources.socrata",
]

# Mappers must remain pure transformations of `RawRecord` and `SourceSnapshot`.
# Network, filesystem, and other I/O belongs in adapters, not mappers — so no
# mapper module may import `civix.infra`. Adapters in the same slice still can.
[[tool.importlinter.contracts]]
name = "mappers stay pure"
type = "forbidden"
source_modules = [
    "civix.domains.building_energy_emissions.adapters.sources.ca.ontario_ewrb.mapper",
