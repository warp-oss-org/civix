[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "civix"
version = "0.1.0"
description = "Tooling scaffold for civic data normalization."
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "httpx>=0.27",
    "openpyxl>=3.1.5",
    "pydantic>=2.7",
]

[project.scripts]
civix = "civix.__main__:main"

[project.optional-dependencies]
parquet = [
    "pyarrow>=24.0.0",
]
notebook = [
    "jupyter>=1.1",
    "matplotlib>=3.9",
    "pandas>=2.2",
]

[dependency-groups]
dev = [
    "import-linter>=2.0",
    "pyarrow>=24.0.0",
    "pyright>=1.1.380",
    "pytest>=8.4.2",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.3.0",
    "respx>=0.21",
    "ruff>=0.12.0",
    "types-openpyxl>=3.1.5.20260408",
]

[tool.pyright]
include = ["src", "tests"]
pythonVersion = "3.12"
typeCheckingMode = "strict"
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
addopts = "-q -m 'not live'"
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "live: opt-in tests that hit real civic APIs; excluded by default",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

# Some source-slice import paths exceed 100 chars purely because of the
# domains/<domain>/adapters/sources/<country>/<city> layout. Allow the
# `from ... import (` opening line to overflow in those test files
# rather than rebinding symbols just to dodge formatting.
[tool.ruff.lint.per-file-ignores]
"tests/domains/mobility_observations/adapters/sources/us/chicago_traffic_tracker_*/test_adapter_mapper_drift.py" = [
    "E501",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.hatch.build.targets.wheel]
packages = ["src/civix"]

[tool.importlinter]
root_packages = ["civix"]

# core is pure: no dependency on domains or infra.
[[tool.importlinter.contracts]]
name = "core stays pure"
type = "forbidden"
source_modules = ["civix.core"]
forbidden_modules = ["civix.domains", "civix.infra"]

# Top-level infra is cross-cutting only (http, exporters): it must not
# depend on any domain. Domain-owned adapters may still import civix.infra.
[[tool.importlinter.contracts]]
name = "top-level infra stays cross-cutting"
type = "forbidden"
source_modules = ["civix.infra"]
forbidden_modules = ["civix.domains"]

[[tool.importlinter.contracts]]
name = "lower layers do not import sdk"
type = "forbidden"
source_modules = ["civix.core", "civix.domains", "civix.infra"]
forbidden_modules = ["civix.sdk"]

# Per-domain layering: a domain's models stay pure (no adapter or infra
# dependency). One entry per domain — extend when a new domain lands.
[[tool.importlinter.contracts]]
name = "domain models stay pure"
type = "forbidden"
source_modules = [
    "civix.domains.building_energy_emissions.models",
    "civix.domains.business_licences.models",
    "civix.domains.hazard_risk.models",
    "civix.domains.hazard_mitigation.models",
    "civix.domains.mobility_observations.models",
    "civix.domains.transportation_safety.models",
]
forbidden_modules = [
    "civix.domains.building_energy_emissions.adapters",
    "civix.domains.business_licences.adapters",
    "civix.domains.hazard_risk.adapters",
    "civix.domains.hazard_mitigation.adapters",
    "civix.domains.mobility_observations.adapters",
    "civix.domains.transportation_safety.adapters",
    "civix.infra",
]

# Source slices stay independent of each other across the whole project.
[[tool.importlinter.contracts]]
name = "source slices stay independent"
type = "independence"
modules = [
    "civix.domains.business_licences.adapters.sources.ca.calgary",
    "civix.domains.business_licences.adapters.sources.ca.edmonton",
    "civix.domains.business_licences.adapters.sources.ca.toronto",
