[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "civix"
version = "0.1.0"
description = "Tooling scaffold for civic data normalization."
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
]

[project.scripts]
civix = "civix.__main__:main"

[project.optional-dependencies]
parquet = [
    "pyarrow>=24.0.0",
]

[dependency-groups]
dev = [
    "pyarrow>=24.0.0",
    "pyright>=1.1.380",
    "pytest>=8.4.2",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.3.0",
    "respx>=0.21",
    "ruff>=0.12.0",
]

[tool.pyright]
include = ["src", "tests"]
pythonVersion = "3.12"
typeCheckingMode = "strict"
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
addopts = "-q -m 'not live'"
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "live: opt-in tests that hit real civic APIs; excluded by default",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.hatch.build.targets.wheel]
packages = ["src/civix"]
